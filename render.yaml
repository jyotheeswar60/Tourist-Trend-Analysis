# render.yaml — Render.com deployment configuration
# Deploy: push to GitHub, connect repo on render.com, done.

services:
  - type: web
    name: tourism-analytics-platform
    env: python
    region: oregon
    plan: free

    # Build step: install all Python dependencies
    buildCommand: pip install -r requirements.txt

    # Start: Gunicorn WSGI server, 2 workers for free tier
    startCommand: gunicorn wsgi:server --bind 0.0.0.0:$PORT --workers 2 --timeout 120

    # Environment variables (set in Render dashboard for secrets)
    envVars:
      - key: DEBUG
        value: "false"
      - key: DEFAULT_THEME
        value: "dark"
      - key: CACHE_TYPE
        value: "SimpleCache"
      - key: CACHE_TIMEOUT
        value: "600"
      # For PostgreSQL (optional — uncomment and set in Render dashboard):
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: tourism-db
      #     property: connectionString
